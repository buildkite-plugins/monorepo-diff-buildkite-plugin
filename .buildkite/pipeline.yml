env:
  BUILDKITE_PLUGIN_MONOREPO_DIFF_BUILDKITE_PLUGIN_TEST_MODE: true

steps:
  - block: "Allow this build to run?"
    key: allow_build

  - wait: ~

  - label: ":shell: Shellcheck"
    key: shellcheck
    depends_on: allow_build
    plugins:
      shellcheck#v1.4.0:
        files:
          - hooks/**
          - lib/**
          - commands/**

  - label: ":sparkles: Lint"
    key: lint
    depends_on: allow_build
    plugins:
      plugin-linter#v3.3.0:
        id: monorepo-diff

  - label: ":golang: Test"
    key: test
    depends_on: allow_build
    command: go test ./...
    plugins:
      - docker#v5.13.0:
          image: "golang"
          always-pull: true
          workdir: /plugin
          mount-buildkite-agent: true

  - label: ":linux: Build"
    key: build
    depends_on: allow_build
    command: make local
    artifact_paths: monorepo-diff-buildkite-plugin
    plugins:
      - docker#v5.13.0:
          image: "golang"
          always-pull: true
          workdir: /plugin

  - label: "Security Scan"
    key: security_scan
    depends_on: allow_build
    plugins:
      - secrets#v2.4.0:
          variables:
            GITHUB_TOKEN: GITHUB_TOKEN
      - ossf-scorecard#v1.0.1:
          github_token: $$GITHUB_TOKEN

  - wait: ~

  - label: ":bomb: Triggers"
    plugins:
      - artifacts#v1.9.4:
          download:
            - "monorepo-diff-buildkite-plugin"
      - ${BUILDKITE_PULL_REQUEST_REPO:-$BUILDKITE_REPO}#${BUILDKITE_COMMIT}:
          diff: "cat ./e2e/one-match-one-miss"
          log_level: "debug"
          watch:
            - path: "foo-service/"
              config:
                trigger: "foo-service"
            - path: "hello-service/"
              config:
                trigger: "this-pipeline-does-not-exists"
            - path: "foo-service/"
              config:
                command: "echo running command"
          hooks:
            - command: echo "command hook 1"
            - command: echo "command hook 2"

  - label: ":bomb: Testing notifications"
    plugins:
      - artifacts#v1.9.4:
          download:
            - "monorepo-diff-buildkite-plugin"
      - ${BUILDKITE_PULL_REQUEST_REPO:-$BUILDKITE_REPO}#${BUILDKITE_COMMIT}:
          diff: "cat ./e2e/multiple-paths"
          watch:
            - path:
                - "user-service/infrastructure/"
              config:
                command: "echo i-am-running-in-a-group"

  - label: ":bomb: Testing groups"
    plugins:
      - artifacts#v1.9.4:
          download:
            - "monorepo-diff-buildkite-plugin"
      - ${BUILDKITE_PULL_REQUEST_REPO:-$BUILDKITE_REPO}#${BUILDKITE_COMMIT}:
          diff: "cat ./e2e/multiple-paths"
          watch:
            - path:
                - "user-service/infrastructure/"
                - "product-service/infrastructure/"
              config:
                group: "my group"
                steps:
                  - command: "echo i-am-running-in-a-group"
                  - command: "echo i-am-also-running-in-a-group"

  - label: ":bomb: Testing hooks"
    plugins:
      - artifacts#v1.9.4:
          download:
            - "monorepo-diff-buildkite-plugin"
      - ${BUILDKITE_PULL_REQUEST_REPO:-$BUILDKITE_REPO}#${BUILDKITE_COMMIT}:
          diff: "cat ./e2e/multiple-paths"
          watch:
            - path: "user-service/"
              config:
                trigger: "user-service"
            - path:
                - "user-service/infrastructure/"
                - "product-service/infrastructure/"
              config:
                trigger: "validate-infrastructure"
            - path:
                - "do-not-trigger/"
              config:
                trigger: "this-pipeline-does-not-exists"
          hooks:
            - command: echo "command hook 1"

  - label: ":bomb: Testing wait"
    plugins:
      - artifacts#v1.9.4:
          download:
            - "monorepo-diff-buildkite-plugin"
      - ${BUILDKITE_PULL_REQUEST_REPO:-$BUILDKITE_REPO}#${BUILDKITE_COMMIT}:
          diff: "cat ./e2e/multiple-paths"
          watch:
            - path:
                - "user-service/infrastructure/"
                - "product-service/infrastructure/"
              config:
                command: "echo i-am-running"
          wait: true

  - label: ":bomb: Testing triggers and commands"
    plugins:
      - artifacts#v1.9.4:
          download:
            - "monorepo-diff-buildkite-plugin"
      - ${BUILDKITE_PULL_REQUEST_REPO:-$BUILDKITE_REPO}#${BUILDKITE_COMMIT}:
          diff: "cat ./e2e/commands-or-triggers"
          watch:
            - path: "user-service/"
              config:
                trigger: "user-service"
            - path:
                - "hello/bin/"
                - "world/bin/"
              config:
                command: "echo hello-world"
            - path:
                - "global/"
              config:
                command: "buildkite-agent pipeline upload ./e2e/global/.buildkite/pipeline.yml"
            - path:
                - "do-not-trigger/"
              config:
                trigger: "this-pipeline-does-not-exists"
            - path:
                - "do-not-run-command/"
              config:
                command: "echo this-does-not-run"
            - path:
                - "global/"
              config:
                group: "this is a group"
                command: "echo this-does-not-run"

  - label: ":testtube: Testing default config"
    plugins:
      - artifacts#v1.9.4:
          download:
            - "monorepo-diff-buildkite-plugin"
      - ${BUILDKITE_PULL_REQUEST_REPO:-$BUILDKITE_REPO}#${BUILDKITE_COMMIT}:
          diff: "cat ./e2e/commands-or-triggers"
          watch:
            - path: "not_a_path/"
              config:
                command: echo "This shouldn't run"
            - default:
                command: "echo hello-world"

  - label: ":testtube: Testing default config with map"
    plugins:
      - artifacts#v1.9.4:
          download:
            - "monorepo-diff-buildkite-plugin"
      - ${BUILDKITE_PULL_REQUEST_REPO:-$BUILDKITE_REPO}#${BUILDKITE_COMMIT}:
          diff: "cat ./e2e/commands-or-triggers"
          watch:
            - path: "not_a_path/"
              config:
                command: echo "This shouldn't run"
            - default:
                config:
                  command: "echo hello-world"

  - input: ":package: Create a release?"
    key: release_unblock
    prompt: "Select the release type"
    branches:
      - main
    depends_on:
      - shellcheck
      - lint
      - test
      - build
      - security_scan
    allowed_teams:
      - support
      - deploy
    blocked_state: passed
    fields:
      - key: release-type
        select: "Release Type"
        required: true
        options:
          - label: "Patch (v1.x.X)"
            value: "patch"
          - label: "Minor (v1.X.0)"
            value: "minor"
          - label: "Major (vX.0.0) - Manual only"
            value: "major"

  - label: ":rocket: Pushing a tag to release"
    key: push_tag
    command: ".buildkite/tag.sh"
    branches:
      - main
    depends_on: release_unblock
    env:
      AWS_REGION: us-east-1
    plugins:
      - aws-assume-role-with-web-identity#v1.6.0:
          role-arn: arn:aws:iam::445615400570:role/pipeline-buildkite-monorail-plugin-monorepo
          session-tags:
            - organization_slug
            - organization_id
            - pipeline_slug
      - aws-ssm#v1.1.0:
          parameters:
            GITHUB_TOKEN: /pipelines/buildkite/monorail-plugin-monorepo/github-token